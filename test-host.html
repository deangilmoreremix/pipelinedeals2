<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SmartCRM Remote - Test Host</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: system-ui, -apple-system, sans-serif; }
      #root { min-height: 100vh; }
      .test-controls { padding: 20px; background: #f5f5f5; border-bottom: 1px solid #ddd; }
      .test-controls h2 { margin-bottom: 10px; }
      .test-controls button { margin-right: 10px; padding: 8px 16px; cursor: pointer; }
      .test-controls button.active { background: #007bff; color: white; border: none; }
      .log-container { max-height: 200px; overflow-y: auto; padding: 10px; background: #1a1a1a; color: #0f0; font-family: monospace; font-size: 12px; }
      .log-entry { margin: 4px 0; }
    </style>
  </head>
  <body>
    <div class="test-controls">
      <h2>SmartCRM Remote Test Host</h2>
      <button onclick="loadApp('App')">Load App</button>
      <button onclick="loadApp('SmartCRMApp')">Load SmartCRMApp</button>
      <button onclick="unmount()">Unmount</button>
    </div>
    <div id="root"></div>
    <div class="log-container" id="log"></div>

    <script type="module">
      const mockProps = {
        sharedData: {
          user: { id: 'test-user', name: 'Test User', email: 'test@example.com' },
          isAuthenticated: true,
          theme: 'light'
        },
        initialRoute: '',
        onEvent: (event) => console.log('[Test Host] Received event:', event),
        onDataUpdate: (data) => console.log('[Test Host] Data update:', data)
      };

      let appContainer = document.getElementById('root');
      let currentRoot = null;

      function log(message) {
        const logDiv = document.getElementById('log');
        const entry = document.createElement('div');
        entry.className = 'log-entry';
        entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
        logDiv.appendChild(entry);
        logDiv.scrollTop = logDiv.scrollHeight;
      }

      window.unmount = function() {
        if (currentRoot) {
          currentRoot.unmount();
          currentRoot = null;
          log('Unmounted');
        }
      };

      window.loadApp = async function(componentName) {
        log(`Loading ${componentName}...`);

        try {
          // Set remote flag before loading
          window.__SMARTCRM_REMOTE__ = true;

          // Initialize the shared scope first
          const module = await import('./dist/assets/remoteEntry.js');
          log('remoteEntry.js loaded');

          // Initialize shared dependencies
          await module.init({
            react: { singleton: true, requiredVersion: '^18.3.1' },
            'react-dom': { singleton: true, requiredVersion: '^18.3.1' },
            zustand: { singleton: true, requiredVersion: '^4.4.7' }
          });
          log('Shared dependencies initialized');

          // Get the remote module
          const RemoteModule = await module.get('./' + componentName);
          log(`${componentName} module retrieved`);

          if (currentRoot) {
            currentRoot.unmount();
          }

          currentRoot = null;
          appContainer.innerHTML = '';

          const { createRoot } = await import('react-dom/client');
          const { createElement } = await import('react');

          currentRoot = createRoot(appContainer);
          currentRoot.render(createElement(RemoteModule, mockProps));
          log(`${componentName} mounted successfully`);
        } catch (err) {
          log(`ERROR: ${err.message || err}`);
          console.error(err);
        }
      };

      log('Test host initialized');
    </script>
  </body>
</html>
